<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hazırlama Aracı</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <style>
        /* Standart A4 Sayfa Yapısı (96 DPI ekran ortamında) */
        .a4-page {
            width: 794px;
            height: 1123px;
            min-height: 1123px;
            max-height: 1123px;
            box-sizing: border-box;
            background: white;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            page-break-after: always;
            break-after: page;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Sayfa İçi Çift Sütun Yapısı */
        .two-columns {
            column-count: 2;
            column-gap: 2rem;
            column-rule: 1px solid #cbd5e1;
            width: 100%;
            flex: 1;
        }

        /* Tek Sütunluk Soru */
        .question-item {
            break-inside: avoid;
            page-break-inside: avoid;
            display: inline-block;
            width: 100%;
            margin-bottom: 1.25rem;
        }

        /* İki Sütunu da Kaplayan Geniş (LGS) Soru */
        .question-item.span-all {
            display: block !important;
            column-span: all !important;
            -webkit-column-span: all !important;
            width: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-200 font-sans h-screen flex overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-300 shadow-xl flex flex-col p-4 overflow-y-auto z-10 relative">
        <h2 class="text-xl font-bold text-slate-800 mb-6 border-b pb-2">Sınav Ayarları</h2>
        
        <div class="flex flex-col gap-4 mb-6">
            <input type="text" id="input-test-name" placeholder="Test Adı" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            <input type="text" id="input-school-name" placeholder="Okul Adı" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            <input type="text" id="input-desc" placeholder="Test ile ilgili açıklama" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            
            <div class="flex gap-2">
                <input type="text" id="input-class" placeholder="Sınıf/Şube" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500 w-1/2" />
                <select class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500 w-1/2 text-slate-600">
                    <option>Grup Yok</option>
                    <option>A Grubu</option>
                    <option>B Grubu</option>
                </select>
            </div>
        </div>

        <div class="border-t border-slate-200 pt-4 mb-6 flex flex-col gap-3">
            <h3 class="font-bold text-slate-700 text-sm">Cevap Anahtarı Ayarları</h3>
            
            <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer select-none">
                <input type="checkbox" id="chk-ans-key" checked class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                Cevap Anahtarı Ekle
            </label>
            
            <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer select-none ml-2">
                <input type="checkbox" id="chk-ans-page" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                Ayrı Sayfada Göster
            </label>
        </div>

        <button id="download-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition shadow-lg mt-auto">
            Kağıdı Hazırla (PDF İndir)
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 flex flex-col items-center gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-4xl border border-slate-300">
            <div class="mb-4">
                <input type="file" id="pdf-upload" accept="application/pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded border cursor-pointer" />
            </div>

            <div id="pdf-container" class="hidden flex-col items-center w-full">
                <div class="flex items-center justify-between w-full mb-4 bg-slate-50 p-3 rounded border shadow-sm">
                    <div class="flex items-center gap-2">
                        <button id="prev-page" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100 text-sm">Önceki</button>
                        <span class="text-sm font-medium">Sayfa: <span id="page-num">0</span> / <span id="page-count">0</span></span>
                        <button id="next-page" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100 text-sm">Sonraki</button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1 bg-white border border-slate-300 p-1 rounded">
                            <span class="text-xs font-bold text-slate-500 mr-1">Cevap:</span>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="A">A</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="B">B</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="C">C</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="D">D</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="E">E</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition border-l ml-1" data-ans="-">-</button>
                        </div>
                        <button id="crop-btn" class="px-6 py-2 bg-green-600 text-white text-sm font-bold rounded hover:bg-green-700 transition shadow">Soruyu Ekle</button>
                    </div>
                </div>
                
                <div class="relative border border-slate-300 w-full bg-slate-200" style="min-height: 400px;">
                    <canvas id="pdf-render" class="hidden"></canvas>
                    <img id="pdf-image" src="" alt="" class="max-w-full block" />
                </div>
            </div>
        </div>

        <div id="pages-container" class="flex flex-col items-center">
            </div>

    </main>

    <script>
        let pageCount = 0;

        // YENİ A4 SAYFASI OLUŞTURMA FONKSİYONU
        function createNewPage() {
            pageCount++;
            const pageDiv = document.createElement('div');
            pageDiv.className = 'a4-page';
            pageDiv.setAttribute('data-page-index', pageCount);

            const testName = document.getElementById('input-test-name').value || 'TEST ADI';
            const schoolName = document.getElementById('input-school-name').value || 'OKUL ADI';
            const desc = document.getElementById('input-desc').value || 'Açıklama alanı';
            const className = document.getElementById('input-class').value || '.....';

            // Sayfa 1 için detaylı başlık, Sayfa 2+ için sade başlık
            const headerHTML = pageCount === 1 ? `
                <div class="border-b-2 border-black pb-3 mb-4 text-center">
                    <h1 class="a4-school-name text-lg font-bold uppercase mb-1">${schoolName}</h1>
                    <h2 class="a4-test-name text-xl font-extrabold uppercase mb-2">${testName}</h2>
                    <div class="flex justify-between text-sm font-medium">
                        <span class="a4-desc italic">${desc}</span>
                        <div>
                            Ad Soyad: ................................<br>
                            Sınıf/No: <span class="a4-class">${className}</span> / ........
                        </div>
                    </div>
                </div>
            ` : `
                <div class="border-b border-slate-400 pb-2 mb-4 flex justify-between items-center text-xs text-slate-600 font-bold uppercase">
                    <span>${schoolName} - ${testName}</span>
                    <span>Sayfa ${pageCount}</span>
                </div>
            `;

            pageDiv.innerHTML = `
                ${headerHTML}
                <div class="questions-list two-columns"></div>
                <div class="page-footer text-center text-xs text-slate-400 border-t border-slate-200 pt-2 mt-auto">
                    Sayfa <span class="current-page-num">${pageCount}</span>
                </div>
            `;

            document.getElementById('pages-container').appendChild(pageDiv);

            // Yeni oluşturulan sayfa için SortableJS (Sürükle-Bırak) Tanımlama
            const qList = pageDiv.querySelector('.questions-list');
            new Sortable(qList, {
                group: 'shared-questions', // Sayfalar arası sürükle bırak sağlayan grup
                animation: 150,
                ghostClass: 'opacity-50',
                cursor: 'move',
                onEnd: () => {
                    checkAndFixOverflow();
                    updateAllQuestionNumbers();
                }
            });

            return pageDiv;
        }

        // İlk Sayfayı Başlat
        createNewPage();

        // Sol Menü Verilerini Anlık Olarak Tüm Sayfalara Yansıtma
        const bindInputsToAllPages = () => {
            const testName = document.getElementById('input-test-name').value || 'TEST ADI';
            const schoolName = document.getElementById('input-school-name').value || 'OKUL ADI';
            const desc = document.getElementById('input-desc').value || 'Açıklama alanı';
            const className = document.getElementById('input-class').value || '.....';

            document.querySelectorAll('.a4-school-name').forEach(el => el.textContent = schoolName);
            document.querySelectorAll('.a4-test-name').forEach(el => el.textContent = testName);
            document.querySelectorAll('.a4-desc').forEach(el => el.textContent = desc);
            document.querySelectorAll('.a4-class').forEach(el => el.textContent = className);
        };

        ['input-test-name', 'input-school-name', 'input-desc', 'input-class'].forEach(id => {
            document.getElementById(id).addEventListener('input', bindInputsToAllPages);
        });

        // PDF Ayarları
        let pdfDoc = null, pageNum = 1, pageIsRendering = false, pageNumIsPending = null, cropper = null;
        const scale = 2.0; 
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');
        const imgElement = document.getElementById('pdf-image');

        const renderPage = num => {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    pageIsRendering = false;
                    imgElement.src = canvas.toDataURL('image/png');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imgElement, {
                        viewMode: 1, autoCropArea: 0.5, zoomable: false, movable: false,
                    });
                    if (pageNumIsPending !== null) { renderPage(pageNumIsPending); pageNumIsPending = null; }
                });
                document.getElementById('page-num').textContent = num;
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) pageNumIsPending = num;
            else renderPage(num);
        };

        document.getElementById('prev-page').addEventListener('click', () => {
            if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum);
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum);
        });

        document.getElementById('pdf-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file.type !== 'application/pdf') return alert('Geçerli bir PDF yükleyin.');
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(pdfDoc_ => {
                    pdfDoc = pdfDoc_;
                    document.getElementById('page-count').textContent = pdfDoc.numPages;
                    document.getElementById('pdf-container').classList.remove('hidden');
                    document.getElementById('pdf-container').classList.add('flex');
                    pageNum = 1; renderPage(pageNum);
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        // Cevap Butonları Seçimi
        let selectedAnswer = "-";
        const ansBtns = document.querySelectorAll('.ans-btn');
        ansBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                ansBtns.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-slate-100', 'text-black');
                });
                e.target.classList.remove('bg-slate-100', 'text-black');
                e.target.classList.add('bg-blue-600', 'text-white');
                selectedAnswer = e.target.getAttribute('data-ans');
            });
        });

        // Soru Numaralarını Tüm Sayfalarda Sırayla Güncelleme
        function updateAllQuestionNumbers() {
            const allQuestions = document.querySelectorAll('.question-item');
            allQuestions.forEach((item, index) => {
                const qNum = index + 1;
                item.querySelector('.q-num-text').textContent = qNum + '.';
                item.setAttribute('data-qnum', qNum);
            });
        }

        // Sayfa Taşma Kontrolü ve Otomatik Sayfa Aktarımı
        function checkAndFixOverflow() {
            const pages = document.querySelectorAll('.a4-page');
            pages.forEach((page, index) => {
                // Eğer sayfa A4 sınırını (1123px) aşıyorsa
                while (page.scrollHeight > 1123) {
                    const qList = page.querySelector('.questions-list');
                    if (qList.children.length <= 1) break; // Tek soru devasa ise sayfada kalsın
                    
                    const lastQuestion = qList.lastElementChild;
                    let nextPage = pages[index + 1];
                    
                    if (!nextPage) {
                        nextPage = createNewPage();
                    }
                    
                    const nextQList = nextPage.querySelector('.questions-list');
                    nextQList.insertBefore(lastQuestion, nextQList.firstChild);
                }
            });

            // Boş kalan fazla sayfaları temizleme (İlk sayfa hariç)
            const updatedPages = document.querySelectorAll('.a4-page');
            for (let i = updatedPages.length - 1; i > 0; i--) {
                const p = updatedPages[i];
                if (p.querySelector('.questions-list').children.length === 0) {
                    p.remove();
                    pageCount--;
                } else {
                    break;
                }
            }
            updateAllQuestionNumbers();
        }

        // Soru Ekleme Mantığı
        document.getElementById('crop-btn').addEventListener('click', () => {
            if (!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas({ fillColor: '#fff' });
            
            if (croppedCanvas) {
                const imgData = croppedCanvas.toDataURL('image/png');
                
                // Genişlik Tespiti
                const cropData = cropper.getData();
                const imageData = cropper.getImageData();
                const isLarge = (cropData.width / imageData.naturalWidth) > 0.55;
                
                const questionDiv = document.createElement('div');
                questionDiv.className = `question-item group relative cursor-move ${isLarge ? 'span-all' : ''}`;
                questionDiv.setAttribute('data-ans', selectedAnswer);
                
                questionDiv.innerHTML = `
                    <div class="teacher-ui bg-red-100 border border-red-300 p-1.5 rounded-t flex justify-between items-center mb-1 text-xs">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-red-700">Cevap: ${selectedAnswer}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <button class="toggle-span-btn bg-slate-200 hover:bg-slate-300 text-slate-800 px-2 py-0.5 rounded font-medium transition">
                                ${isLarge ? 'Genişlik: Tüm Satır' : 'Genişlik: Tek Sütun'}
                            </button>
                            <button class="delete-btn bg-red-600 hover:bg-red-700 text-white px-2 py-0.5 rounded font-bold transition">Sil</button>
                        </div>
                    </div>

                    <div class="student-question-content flex items-start gap-2">
                        <span class="q-num-text font-bold text-slate-900 text-base min-w-[20px] pt-0.5">1.</span>
                        <div class="flex-1">
                            <img src="${imgData}" class="w-full h-auto object-contain block" />
                        </div>
                    </div>
                `;
                
                // Genişlik Değiştirme Butonu
                const toggleBtn = questionDiv.querySelector('.toggle-span-btn');
                toggleBtn.onclick = function() {
                    questionDiv.classList.toggle('span-all');
                    const isSpanned = questionDiv.classList.contains('span-all');
                    toggleBtn.textContent = isSpanned ? 'Genişlik: Tüm Satır' : 'Genişlik: Tek Sütun';
                    checkAndFixOverflow();
                };

                // Silme İşlemi
                questionDiv.querySelector('.delete-btn').onclick = function() {
                    questionDiv.remove();
                    checkAndFixOverflow();
                };
                
                // Soruyu en son sayfaya ekle
                const pages = document.querySelectorAll('.a4-page');
                const lastPage = pages[pages.length - 1];
                lastPage.querySelector('.questions-list').appendChild(questionDiv);
                
                // Taşma kontrolü yap ve numaraları güncelle
                checkAndFixOverflow();
                
                // Cevap seçimini sıfırla
                ansBtns.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-slate-100', 'text-black');
                });
                selectedAnswer = "-";
            }
        });

        // PDF İNDİRME İŞLEMİ
        document.getElementById('download-btn').addEventListener('click', () => {
            const pagesContainer = document.getElementById('pages-container');
            const testName = document.getElementById('input-test-name').value || 'Test_Kagidi';
            const showAnsKey = document.getElementById('chk-ans-key').checked;
            const separatePage = document.getElementById('chk-ans-page').checked;

            // 1. Öğretmen Kontrol Panellerini Gizle
            const teacherUIs = document.querySelectorAll('.teacher-ui');
            teacherUIs.forEach(ui => ui.style.display = 'none');

            let tempAnsPage = null;

            // 2. Cevap Anahtarını Oluştur ve Yerleştir
            if (showAnsKey) {
                const answerKeyHTML = `
                    <div class="answer-key-box mt-6 border-t-2 border-black pt-4">
                        <h3 class="text-center font-bold text-base mb-3">CEVAP ANAHTARI</h3>
                        <div class="ans-grid grid grid-cols-5 gap-2 text-xs font-semibold"></div>
                    </div>
                `;

                if (separatePage) {
                    // Ayrı sayfada göster seçeneği işaretliyse yeni bir A4 oluştur
                    tempAnsPage = document.createElement('div');
                    tempAnsPage.className = 'a4-page';
                    tempAnsPage.innerHTML = `
                        <div class="border-b-2 border-black pb-2 mb-6 text-center">
                            <h2 class="text-lg font-bold">${testName} - CEVAP ANAHTARI</h2>
                        </div>
                        <div class="ans-grid grid grid-cols-5 gap-3 text-sm font-semibold p-4"></div>
                    `;
                    pagesContainer.appendChild(tempAnsPage);
                    
                    const grid = tempAnsPage.querySelector('.ans-grid');
                    document.querySelectorAll('.question-item').forEach(item => {
                        grid.innerHTML += `<div class="p-2 border border-slate-300 rounded text-center bg-slate-50"><strong>${item.getAttribute('data-qnum')})</strong> ${item.getAttribute('data-ans')}</div>`;
                    });
                } else {
                    // En son sayfanın altına ekle
                    const pages = document.querySelectorAll('.a4-page');
                    const lastPage = pages[pages.length - 1];
                    const ansDiv = document.createElement('div');
                    ansDiv.className = 'temp-ans-inline';
                    ansDiv.innerHTML = answerKeyHTML;
                    lastPage.appendChild(ansDiv);

                    const grid = ansDiv.querySelector('.ans-grid');
                    document.querySelectorAll('.question-item').forEach(item => {
                        grid.innerHTML += `<div class="p-1 border border-slate-300 rounded text-center"><strong>${item.getAttribute('data-qnum')})</strong> ${item.getAttribute('data-ans')}</div>`;
                    });
                }
            }

            // 3. PDF Oluşturma Ayarları
            const opt = {
                margin:       0,
                filename:     testName + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 4. PDF İndir ve Arayüzü Temizle
            html2pdf().set(opt).from(pagesContainer).save().then(() => {
                // Öğretmen panellerini geri aç
                teacherUIs.forEach(ui => ui.style.display = '');
                
                // Geçici cevap anahtarlarını kaldır
                if (tempAnsPage) tempAnsPage.remove();
                document.querySelectorAll('.temp-ans-inline').forEach(el => el.remove());
            });
        });
    </script>
</body>
</html>
