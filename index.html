<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hazırlama Aracı</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <style>
        .a4-page { 
            width: 794px; 
            height: 1123px; 
            min-height: 1123px; 
            max-height: 1123px; 
            box-sizing: border-box; 
            background: white; 
            padding: 40px; 
            margin-bottom: 30px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
        .two-columns { 
            column-count: 2; 
            column-gap: 2.5rem; 
            width: 100%; 
            height: 100%; 
        }
        .question-item { 
            break-inside: avoid; 
            page-break-inside: avoid; 
            display: inline-block; 
            width: 100%; 
            margin-bottom: 1.25rem; 
            padding-bottom: 1.25rem; 
            border-bottom: 1px dashed #e2e8f0; 
            background: white; 
            position: relative; 
            z-index: 10; 
        }
        .question-item.span-all { 
            display: block !important; 
            column-span: all !important; 
            -webkit-column-span: all !important; 
            width: 100% !important; 
        }
        .student-question-content img { 
            max-height: 800px; 
            object-fit: contain; 
        }
    </style>
</head>
<body class="bg-slate-200 font-sans h-screen flex overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-300 shadow-xl flex flex-col p-4 overflow-y-auto z-10 relative">
        <h2 class="text-xl font-bold text-slate-800 mb-6 border-b pb-2">Sınav Ayarları</h2>
        
        <div class="flex flex-col gap-4 mb-6">
            <input type="text" id="input-test-name" placeholder="Test Adı" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            <input type="text" id="input-school-name" placeholder="Okul Adı" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            <input type="text" id="input-desc" placeholder="Test ile ilgili açıklama" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500" />
            
            <div class="flex gap-2">
                <input type="text" id="input-class" placeholder="Sınıf/Şube" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500 w-1/2" />
                <select id="select-group" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500 w-1/2 text-slate-600">
                    <option>Grup Yok</option>
                    <option>A Grubu</option>
                    <option>B Grubu</option>
                </select>
            </div>
        </div>

        <div class="border-t border-slate-200 pt-4 mb-6 flex flex-col gap-3">
            <h3 class="font-bold text-slate-700 text-sm">Cevap Anahtarı Konumu</h3>
            <select id="select-ans-pos" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500 text-sm text-slate-700">
                <option value="none">Cevap Anahtarı Ekleme</option>
                <option value="page-bottom" selected>Her Sayfanın Altında (Sütunlu)</option>
                <option value="end-page">Ayrı Sayfada (Sonda)</option>
            </select>
        </div>

        <button id="download-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition shadow-lg mt-auto">
            Kağıdı Hazırla (PDF İndir)
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 flex flex-col items-center gap-8">
        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-4xl border border-slate-300">
            <div class="mb-4">
                <input type="file" id="file-upload" accept="application/pdf, image/png, image/jpeg, image/jpg" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded border cursor-pointer" />
                <p class="text-xs text-slate-400 mt-1">PDF dosyası veya tekli soru resimleri (JPG, PNG) yükleyebilirsiniz.</p>
            </div>
            <div id="pdf-container" class="hidden flex-col items-center w-full">
                <div class="flex items-center justify-between w-full mb-4 bg-slate-50 p-3 rounded border shadow-sm">
                    <div id="pagination-controls" class="flex items-center gap-2">
                        <button id="prev-page" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100 text-sm">Önceki</button>
                        <span class="text-sm font-medium">Sayfa: <span id="page-num">0</span> / <span id="page-count">0</span></span>
                        <button id="next-page" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100 text-sm">Sonraki</button>
                    </div>
                    <div class="flex items-center gap-4 ml-auto">
                        <div class="flex items-center gap-1 bg-white border border-slate-300 p-1 rounded">
                            <span class="text-xs font-bold text-slate-500 mr-1">Cevap:</span>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="A">A</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="B">B</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="C">C</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="D">D</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition" data-ans="E">E</button>
                            <button class="ans-btn px-3 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold transition border-l ml-1" data-ans="-">-</button>
                        </div>
                        <button id="crop-btn" class="px-6 py-2 bg-green-600 text-white text-sm font-bold rounded hover:bg-green-700 transition shadow">Soruyu Ekle</button>
                    </div>
                </div>
                <div class="relative border border-slate-300 w-full bg-slate-200 flex justify-center items-center overflow-hidden" style="min-height: 400px; max-height: 600px;">
                    <canvas id="pdf-render" class="hidden"></canvas>
                    <img id="pdf-image" src="" alt="" class="max-w-full max-h-full block" />
                </div>
            </div>
        </div>
        <div id="pages-container" class="flex flex-col items-center w-full"></div>
    </main>

    <script>
        function createNewPage() {
            const currentPages = document.querySelectorAll('.a4-page').length;
            const newPageNum = currentPages + 1;
            const pageDiv = document.createElement('div');
            pageDiv.className = 'a4-page';
            
            const testName = document.getElementById('input-test-name').value || 'TEST ADI';
            const schoolName = document.getElementById('input-school-name').value || 'OKUL ADI';
            const desc = document.getElementById('input-desc').value || 'Açıklama alanı';
            const className = document.getElementById('input-class').value || '.....';

            const headerHTML = newPageNum === 1 ? `
                <div class="border-b-2 border-black pb-3 mb-4 text-center z-20 bg-white relative">
                    <h1 class="a4-school-name text-lg font-bold uppercase mb-1">${schoolName}</h1>
                    <h2 class="a4-test-name text-xl font-extrabold uppercase mb-2">${testName}</h2>
                    <div class="flex justify-between text-sm font-medium">
                        <span class="a4-desc italic">${desc}</span>
                        <div>
                            Ad Soyad: ................................<br>
                            Sınıf/No: <span class="a4-class">${className}</span> / ........
                        </div>
                    </div>
                </div>
            ` : `
                <div class="border-b border-slate-400 pb-2 mb-4 flex justify-between items-center text-xs text-slate-600 font-bold uppercase z-20 bg-white relative">
                    <span><span class="a4-school-name">${schoolName}</span> - <span class="a4-test-name">${testName}</span></span>
                    <span class="page-header-num">Sayfa ${newPageNum}</span>
                </div>
            `;

            pageDiv.innerHTML = `
                ${headerHTML}
                <div class="flex-1 relative w-full flex flex-col">
                    <div class="absolute top-0 bottom-0 left-1/2 w-[1.5px] bg-slate-600 transform -translate-x-1/2 pointer-events-none z-0"></div>
                    <div class="questions-list two-columns relative z-10 w-full h-full"></div>
                </div>
                <div class="page-footer text-center text-xs text-slate-400 border-t border-slate-200 pt-2 mt-auto z-20 bg-white relative">
                    Sayfa <span class="current-page-num">${newPageNum}</span>
                </div>
            `;

            document.getElementById('pages-container').appendChild(pageDiv);

            const qList = pageDiv.querySelector('.questions-list');
            new Sortable(qList, {
                group: 'shared-questions',
                animation: 150,
                ghostClass: 'opacity-50',
                cursor: 'move',
                onEnd: () => { checkAndFixOverflow(); }
            });

            return pageDiv;
        }

        createNewPage();

        const bindInputsToAllPages = () => {
            const testName = document.getElementById('input-test-name').value || 'TEST ADI';
            const schoolName = document.getElementById('input-school-name').value || 'OKUL ADI';
            const desc = document.getElementById('input-desc').value || 'Açıklama alanı';
            const className = document.getElementById('input-class').value || '.....';

            document.querySelectorAll('.a4-school-name').forEach(el => el.textContent = schoolName);
            document.querySelectorAll('.a4-test-name').forEach(el => el.textContent = testName);
            document.querySelectorAll('.a4-desc').forEach(el => el.textContent = desc);
            document.querySelectorAll('.a4-class').forEach(el => el.textContent = className);
        };
        ['input-test-name', 'input-school-name', 'input-desc', 'input-class'].forEach(id => {
            document.getElementById(id).addEventListener('input', bindInputsToAllPages);
        });

        let pdfDoc = null, pageNum = 1, pageIsRendering = false, pageNumIsPending = null, cropper = null;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');
        const imgElement = document.getElementById('pdf-image');

        const renderPage = num => {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 2.0 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    pageIsRendering = false;
                    imgElement.src = canvas.toDataURL('image/png');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imgElement, { viewMode: 1, autoCropArea: 0.5, zoomable: false, movable: false });
                    if (pageNumIsPending !== null) { renderPage(pageNumIsPending); pageNumIsPending = null; }
                });
                document.getElementById('page-num').textContent = num;
            });
        };

        const queueRenderPage = num => { if (pageIsRendering) pageNumIsPending = num; else renderPage(num); };
        document.getElementById('prev-page').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum); });
        document.getElementById('next-page').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum); });

        document.getElementById('file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const pdfContainer = document.getElementById('pdf-container');
            const paginationControls = document.getElementById('pagination-controls');

            pdfContainer.classList.remove('hidden');
            pdfContainer.classList.add('flex');

            if (file.type === 'application/pdf') {
                paginationControls.style.display = 'flex';
                const fileReader = new FileReader();
                fileReader.onload = function() {
                    pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdfDoc_ => {
                        pdfDoc = pdfDoc_;
                        document.getElementById('page-count').textContent = pdfDoc.numPages;
                        pageNum = 1; renderPage(pageNum);
                    });
                };
                fileReader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                paginationControls.style.display = 'none';
                const fileReader = new FileReader();
                fileReader.onload = function(event) {
                    imgElement.src = event.target.result;
                    if (cropper) cropper.destroy();
                    setTimeout(() => {
                        cropper = new Cropper(imgElement, { viewMode: 1, autoCropArea: 0.5, zoomable: false, movable: false });
                    }, 50);
                };
                fileReader.readAsDataURL(file);
            } else {
                alert('Lütfen sadece PDF veya Resim formatında bir dosya yükleyin.');
            }
        });

        let selectedAnswer = "-";
        const ansBtns = document.querySelectorAll('.ans-btn');
        ansBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                ansBtns.forEach(b => { b.classList.remove('bg-blue-600', 'text-white'); b.classList.add('bg-slate-100', 'text-black'); });
                e.target.classList.remove('bg-slate-100', 'text-black');
                e.target.classList.add('bg-blue-600', 'text-white');
                selectedAnswer = e.target.getAttribute('data-ans');
            });
        });

        function updateAllQuestionNumbers() {
            document.querySelectorAll('.question-item').forEach((item, index) => {
                const qNum = index + 1;
                item.querySelector('.q-num-text').textContent = qNum + '.';
                item.setAttribute('data-qnum', qNum);
            });
        }

        function updatePageNumbersAndHeaders() {
            document.querySelectorAll('.a4-page').forEach((page, index) => {
                const pageNum = index + 1;
                const footerNum = page.querySelector('.current-page-num');
                if (footerNum) footerNum.textContent = pageNum;
                const headerNum = page.querySelector('.page-header-num');
                if (headerNum) headerNum.textContent = `Sayfa ${pageNum}`;
            });
        }

        function checkAndFixOverflow() {
            const pages = Array.from(document.querySelectorAll('.a4-page'));
            let hasMoved = false;

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                const qList = page.querySelector('.questions-list');
                
                if (!qList || qList.children.length <= 1) continue;

                const pageRect = page.getBoundingClientRect();
                const maxBottom = pageRect.bottom - 45; 
                const maxRight = pageRect.right - 35;

                let isOverflowing = true;
                
                while (isOverflowing && qList.children.length > 1) {
                    const lastQuestion = qList.lastElementChild;
                    const qRect = lastQuestion.getBoundingClientRect();
                    
                    if (qRect.bottom > maxBottom || qRect.right > maxRight || qList.scrollWidth > qList.clientWidth + 5) {
                        let nextPage = pages[i + 1];
                        if (!nextPage) {
                            nextPage = createNewPage();
                            pages.push(nextPage); 
                        }
                        
                        const nextQList = nextPage.querySelector('.questions-list');
                        nextQList.insertBefore(lastQuestion, nextQList.firstChild);
                        hasMoved = true;
                    } else {
                        isOverflowing = false;
                    }
                }
            }

            const updatedPages = document.querySelectorAll('.a4-page');
            for (let i = updatedPages.length - 1; i > 0; i--) {
                const qList = updatedPages[i].querySelector('.questions-list');
                if (qList && qList.children.length === 0) {
                    updatedPages[i].remove();
                }
            }

            if (hasMoved) {
                checkAndFixOverflow();
            } else {
                updatePageNumbersAndHeaders();
                updateAllQuestionNumbers();
            }
        }

        document.getElementById('crop-btn').addEventListener('click', () => {
            if (!cropper) return;

            if (selectedAnswer === "-") {
                const confirmAdd = confirm("Bu soru için bir cevap seçmediniz. Soruyu cevap şıkkı belirtmeden eklemek istiyor musunuz?");
                if (!confirmAdd) return; 
            }

            const croppedCanvas = cropper.getCroppedCanvas({ fillColor: '#fff' });
            
            if (croppedCanvas) {
                const imgData = croppedCanvas.toDataURL('image/png');
                const cropData = cropper.getData();
                const imageData = cropper.getImageData();
                const isLarge = (cropData.width / imageData.naturalWidth) > 0.55;
                
                const questionDiv = document.createElement('div');
                questionDiv.className = `question-item group relative cursor-move ${isLarge ? 'span-all' : ''}`;
                questionDiv.setAttribute('data-ans', selectedAnswer);
                
                questionDiv.innerHTML = `
                    <div class="teacher-ui bg-red-100 border border-red-300 p-1.5 rounded-t flex justify-between items-center mb-1 text-xs">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-red-700">Cevap: ${selectedAnswer}</span>
                            <div class="flex items-center bg-white rounded border border-red-200 ml-2 shadow-sm">
                                <button class="space-decrease px-2 py-0.5 hover:bg-slate-100 font-bold text-red-600 border-r border-red-100" title="Boşluğu Azalt">-</button>
                                <span class="px-2 text-[10px] font-bold text-slate-600">Boşluk</span>
                                <button class="space-increase px-2 py-0.5 hover:bg-slate-100 font-bold text-green-600 border-l border-red-100" title="Boşluğu Artır">+</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <button class="toggle-span-btn bg-slate-200 hover:bg-slate-300 text-slate-800 px-2 py-0.5 rounded font-medium transition">
                                ${isLarge ? 'Genişlik: Tüm Satır' : 'Genişlik: Tek Sütun'}
                            </button>
                            <button class="delete-btn bg-red-600 hover:bg-red-700 text-white px-2 py-0.5 rounded font-bold transition">Sil</button>
                        </div>
                    </div>
                    <div class="student-question-content flex items-start gap-2 flex-col w-full">
                        <div class="flex items-start gap-2 w-full">
                            <span class="q-num-text font-bold text-slate-900 text-base min-w-[20px] pt-0.5">1.</span>
                            <div class="flex-1 w-full">
                                <img src="${imgData}" class="w-full object-contain block" />
                            </div>
                        </div>
                        <div class="solution-space w-full rounded" style="height: 0px;"></div>
                    </div>
                `;
                
                const solutionSpace = questionDiv.querySelector('.solution-space');
                let currentSpace = 0;

                questionDiv.querySelector('.space-increase').onclick = function() {
                    currentSpace += 60;
                    solutionSpace.style.height = currentSpace + 'px';
                    if(currentSpace > 0) {
                        solutionSpace.classList.add('has-space', 'border', 'border-dashed', 'border-blue-300', 'bg-blue-50', 'mt-2', 'flex', 'items-center', 'justify-center');
                        solutionSpace.innerHTML = '<span class="text-blue-400 text-xs font-medium solution-text">Çözüm Alanı</span>';
                    }
                    checkAndFixOverflow();
                };

                questionDiv.querySelector('.space-decrease').onclick = function() {
                    if(currentSpace >= 60) {
                        currentSpace -= 60;
                        solutionSpace.style.height = currentSpace + 'px';
                        if(currentSpace === 0) {
                            solutionSpace.classList.remove('has-space', 'border', 'border-dashed', 'border-blue-300', 'bg-blue-50', 'mt-2', 'flex', 'items-center', 'justify-center');
                            solutionSpace.innerHTML = '';
                        }
                        checkAndFixOverflow();
                    }
                };

                questionDiv.querySelector('.toggle-span-btn').onclick = function() {
                    questionDiv.classList.toggle('span-all');
                    this.textContent = questionDiv.classList.contains('span-all') ? 'Genişlik: Tüm Satır' : 'Genişlik: Tek Sütun';
                    checkAndFixOverflow();
                };

                questionDiv.querySelector('.delete-btn').onclick = function() {
                    questionDiv.remove();
                    checkAndFixOverflow();
                };
                
                const pages = document.querySelectorAll('.a4-page');
                pages[pages.length - 1].querySelector('.questions-list').appendChild(questionDiv);
                
                checkAndFixOverflow();
                
                ansBtns.forEach(b => { b.classList.remove('bg-blue-600', 'text-white'); b.classList.add('bg-slate-100', 'text-black'); });
                selectedAnswer = "-";
            }
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            const pagesContainer = document.getElementById('pages-container');
            const testName = document.getElementById('input-test-name').value || 'Test_Kagidi';
            const ansPos = document.getElementById('select-ans-pos').value;
            const tempElements = [];

            const unmarkedQuestions = [];
            document.querySelectorAll('.question-item').forEach(item => {
                if (item.getAttribute('data-ans') === "-") {
                    unmarkedQuestions.push(item.getAttribute('data-qnum'));
                }
            });

            if (unmarkedQuestions.length > 0) {
                const confirmPDF = confirm(`Dikkat! Bazı soruların cevapları seçilmedi (boş):\nSoru No: ${unmarkedQuestions.join(', ')}\n\nYine de PDF indirmek istiyor musunuz?`);
                if (!confirmPDF) return; 
            }

            // PDF öncesi UI elementlerini temizle
            document.querySelectorAll('.teacher-ui').forEach(ui => ui.style.display = 'none');
            document.querySelectorAll('.solution-space').forEach(space => {
                space.classList.remove('border', 'border-dashed', 'border-blue-300', 'bg-blue-50');
                const textEl = space.querySelector('.solution-text');
                if(textEl) textEl.style.display = 'none';
            });

            const allPages = document.querySelectorAll('.a4-page');
            allPages.forEach(page => {
                page.style.marginBottom = '0';
                page.style.boxShadow = 'none';
                page.style.border = 'none';
            });

            // 1. Durum: Her Sayfanın Altında (Sütunlu)
            if (ansPos === 'page-bottom') {
                allPages.forEach(page => {
                    const questions = page.querySelectorAll('.question-item');
                    if (questions.length === 0) return;

                    const containerRect = page.querySelector('.questions-list').getBoundingClientRect();
                    let leftAns = [];
                    let rightAns = [];

                    questions.forEach(q => {
                        const qNum = q.getAttribute('data-qnum');
                        const ans = q.getAttribute('data-ans');
                        const qRect = q.getBoundingClientRect();
                        const relativeLeft = qRect.left - containerRect.left;

                        // Sol sütun mu yoksa sağ sütun mu tespiti (offsetLeft yerine dinamik bounding box)
                        if (q.classList.contains('span-all') || relativeLeft < (containerRect.width / 2 - 10)) {
                            leftAns.push(`<span class="mr-4"><strong>${qNum}.</strong> ${ans}</span>`);
                        } else {
                            rightAns.push(`<span class="mr-4"><strong>${qNum}.</strong> ${ans}</span>`);
                        }
                    });

                    const ansFooter = document.createElement('div');
                    ansFooter.className = 'temp-ans-inline flex justify-between items-center border-t-2 border-slate-400 pt-2 pb-1 mt-auto text-xs font-semibold text-slate-700 bg-white w-full';
                    
                    const leftDiv = document.createElement('div');
                    leftDiv.className = 'w-1/2 pr-4 flex flex-wrap gap-y-1';
                    leftDiv.innerHTML = leftAns.join('');

                    const rightDiv = document.createElement('div');
                    rightDiv.className = 'w-1/2 pl-4 border-l border-slate-300 flex flex-wrap gap-y-1';
                    rightDiv.innerHTML = rightAns.join('');

                    ansFooter.appendChild(leftDiv);
                    ansFooter.appendChild(rightDiv);

                    const pageFooter = page.querySelector('.page-footer');
                    page.insertBefore(ansFooter, pageFooter);
                    tempElements.push(ansFooter);
                });

            // 2. Durum: Ayrı Sayfada (Sonda)
            } else if (ansPos === 'end-page') {
                const newPage = document.createElement('div');
                newPage.className = 'a4-page p-10 flex flex-col items-center justify-start';
                
                // Cevap anahtarı için temiz, şık yeni bir A4 sayfa tasarımı
                newPage.innerHTML = `
                    <div class="w-full text-center border-b-2 border-black pb-4 mb-8 mt-6">
                        <h2 class="text-2xl font-extrabold uppercase tracking-wider text-slate-800">CEVAP ANAHTARI</h2>
                    </div>
                    <div class="w-full max-w-2xl grid grid-cols-5 gap-4 ans-grid"></div>
                `;
                
                const grid = newPage.querySelector('.ans-grid');
                document.querySelectorAll('.question-item').forEach(item => {
                    const qNum = item.getAttribute('data-qnum');
                    const ans = item.getAttribute('data-ans');
                    grid.innerHTML += `
                        <div class="flex items-center justify-between p-3 border border-slate-300 rounded-lg bg-slate-50 shadow-sm">
                            <span class="text-sm font-bold text-slate-700">${qNum}.</span>
                            <span class="text-base font-extrabold text-blue-600 bg-blue-50 px-2.5 py-0.5 rounded border border-blue-200">${ans}</span>
                        </div>
                    `;
                });
                
                pagesContainer.appendChild(newPage);
                tempElements.push(newPage);
            }

            const opt = {
                margin:       0,
                filename:     testName + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'px', format: [794, 1123], orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pagesContainer).save().then(() => {
                // PDF işlemi bittikten sonra geçici elementleri sil ve görünümü eski haline getir
                tempElements.forEach(el => el.remove());

                document.querySelectorAll('.teacher-ui').forEach(ui => ui.style.display = '');
                document.querySelectorAll('.solution-space.has-space').forEach(space => {
                    space.classList.add('border', 'border-dashed', 'border-blue-300', 'bg-blue-50');
                    const textEl = space.querySelector('.solution-text');
                    if(textEl) textEl.style.display = 'block';
                });

                allPages.forEach(page => {
                    page.style.marginBottom = '';
                    page.style.boxShadow = '';
                    page.style.border = '';
                });
            });
        });
    </script>
</body>
</html>
